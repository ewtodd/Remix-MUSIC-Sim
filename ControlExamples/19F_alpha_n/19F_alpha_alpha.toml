[beam]
species = "19F"   # Use "AEl" notation, e.g. 17F where A=17 El(ement) = F
energy_fwhm = 0.5 # Beam energy FWHM [MeV]
dedx_scale = 1.0  # Beam stopping power scale factor

[target]
species = "4He"
compound = "23Na"

[detector]
eloss_bins = 300 # Number of bins for y axis
max_eloss = 5.0  # Max y value [MeV]
strip = 5        # Strip where reaction takes place. Use -1 for unreacted beam
eres = 0.01      # Energy noise level (sigma) in each strip [MeV]

[[reaction.step]]
[reaction.step.evap]
# Integer. See ROOT colors.
name = "4He"
color = 2

[reaction.step.res]
# Integer. See ROOT colors.
name = "19F"
color = 4
dedx_scale = 1.0

[run]
n_events = 1000                # Number of events simulated
wait = 0                       # Wait between simulated events? 1=yes, 0=no
update = 0                     # Update graphics between simulated events? 1=yes, 0=no
max_time = 2000.0              # Maximum time for an event [ns]
sim_step = 0.001               # Simulation step size [cm]
method = 0
output = "traces_aa_stp5.root"
file_opt = "recreate"
print_opt = 0
