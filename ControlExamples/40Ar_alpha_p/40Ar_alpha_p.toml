[beam]
species     = "40Ar" # Use "AEl" notation, e.g. 17F where A=17 El(ement) = F
energy_fwhm = 0.5    # Beam energy FWHM [MeV]
dedx_scale  = 1.0    # Beam stopping power scale factor

[target]
species  = "4He"
compound = "44Ca"

[detector]
eloss_bins  = 500  # Number of bins for y axis
max_eloss   = 40.0 # Max y value [MeV]
strip_first = 4    # First strip
strip_last  = 4    # Last strip
eres        = 0.05 # Energy noise level (sigma) in each strip [MeV]

[[reaction.step]]
[reaction.step.evap]
# Integer. See ROOT colors.
name  = "1H"
color = 2

[reaction.step.res]
# Integer. See ROOT colors.
name       = "43K"
color      = 4
dedx_scale = 1.0

[run]
n_events  = 100                # Number of events simulated
wait      = 1                  # Wait between simulated events? 1=yes, 0=no
update    = 1                  # Update graphics between simulated events? 1=yes, 0=no
max_time  = 2000.0             # Maximum time for an event [ns]
sim_step  = 0.001              # Simulation step size [cm]
method    = 0
output    = "traces_test.root"
file_opt  = "recreate"
print_opt = 0
