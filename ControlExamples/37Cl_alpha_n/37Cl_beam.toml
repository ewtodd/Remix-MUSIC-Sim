[gas]
species     = "4He" # Fill gas: 4He, 3He, Ar, CF4, CH4, P10, iC4H10
pressure    = 220.0 # Torr
temperature = 293.0 # K

[beam]
species     = "37Cl" # Use "AEl" notation
energy      = 92.0   # Beam KE at the accelerator (before entrance window) [MeV]
energy_fwhm = 0.9    # Beam energy FWHM at accelerator [MeV]
dedx_scale  = 1.0    # Beam stopping power scale factor

[target]
species  = "4He"
compound = "41K"

[windows.entrance]
# mg/cm^2 areal density; -1 disables
material         = "Ti"
thickness_mg_cm2 = 0.9

[windows.exit]
# mg/cm^2 areal density; -1 disables
material         = "Ti"
thickness_mg_cm2 = 1.3

[windows.degrader]
thickness_um = -1

[detector]
eloss_bins          = 555  # Number of bins for y axis
max_eloss           = 10.0 # Max y value [MeV]
strip               = -1   # unreacted beam
ignore_short_strips = true # true zeroes 4 cm half-strips on L/R anode branches
# (cathode unaffected — one big plate).

# Per-channel readout noise σ [MeV]. -1 on a given channel disables noise
# there. Mutually exclusive with a scalar `eres` key in [detector].
[detector.eres]
Cathode = -1
S0      = 0.05
L1      = 0.05
R1      = 0.05
L2      = 0.05
R2      = 0.05
L3      = 0.05
R3      = 0.05
L4      = 0.05
R4      = 0.05
L5      = 0.05
R5      = 0.05
L6      = 0.05
R6      = 0.05
L7      = 0.05
R7      = 0.05
L8      = 0.05
R8      = 0.05
L9      = 0.05
R9      = 0.05
L10     = 0.05
R10     = 0.05
L11     = 0.05
R11     = 0.05
L12     = 0.05
R12     = 0.05
L13     = 0.05
R13     = 0.05
L14     = 0.05
R14     = 0.05
L15     = 0.05
R15     = 0.05
L16     = 0.05
R16     = 0.05
S17     = 0.05

[[reaction.step]]
[reaction.step.evap]
name  = "4He"
color = 2

[reaction.step.res]
name       = "37Cl"
color      = 4
dedx_scale = 1.0

[run]
n_events  = 100000
threads   = 32
wait      = 0
update    = 0
max_time  = 2000.0                                                           # ns
sim_step  = 0.001                                                            # cm
method    = 0
output    = "/home/e-work/MUSIC/Remix_37Cl/root_files/traces_37Cl_beam.root"
file_opt  = "recreate"
print_opt = 0
