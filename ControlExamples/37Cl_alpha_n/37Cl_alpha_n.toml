[gas]
species     = "4He" # Fill gas: 4He, 3He, Ar, CF4, CH4, P10, iC4H10
pressure    = 220.0 # Torr
temperature = 293.0 # K

[beam]
species     = "37Cl" # Use "AEl" notation
energy      = 92.0   # Beam KE at the accelerator (before entrance window) [MeV]
energy_fwhm = 0.9    # Beam energy FWHM at accelerator [MeV]
dedx_scale  = 1.0    # Beam stopping power scale factor

[target]
species  = "4He"
compound = "41K"

[windows.entrance]
# mg/cm^2 areal density
material         = "Ti"
thickness_mg_cm2 = 0.9

[windows.exit]
# mg/cm^2 areal density
material         = "Ti"
thickness_mg_cm2 = 1.3

[windows.degrader]
thickness_um = -1

[detector]
eloss_bins          = 555  # Number of bins for y axis
max_eloss           = 10.0 # Max y value [MeV]
strip               = 6
ignore_short_strips = true # true zeroes 4 cm half-strips on L/R anode branches
# (cathode unaffected — one big plate).

# Per-channel readout noise σ [MeV]. -1 on a given channel disables noise
# there. Mutually exclusive with a scalar `eres` key in [detector].
[detector.eres]
Cathode = -1
S0      = -1
L1      = -1
R1      = -1
L2      = -1
R2      = -1
L3      = -1
R3      = -1
L4      = -1
R4      = -1
L5      = -1
R5      = -1
L6      = -1
R6      = -1
L7      = -1
R7      = -1
L8      = -1
R8      = -1
L9      = -1
R9      = -1
L10     = -1
R10     = -1
L11     = -1
R11     = -1
L12     = -1
R12     = -1
L13     = -1
R13     = -1
L14     = -1
R14     = -1
L15     = -1
R15     = -1
L16     = -1
R16     = -1
S17     = -1

[[reaction.step]]
[reaction.step.evap]
name  = "n"
color = 4

[reaction.step.res]
name       = "40K"
color      = 3
dedx_scale = 1.0

[run]
n_events  = 100000
threads   = 32
wait      = 0
update    = 0
max_time  = 2000.0                                                         # ns
sim_step  = 0.001                                                          # cm
method    = 0
output    = "/home/e-work/MUSIC/Remix_37Cl/root_files/traces_37Cl_an.root"
file_opt  = "recreate"
print_opt = 0
