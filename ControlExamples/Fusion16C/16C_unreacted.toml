[beam]
species     = "16C" # Use "AEl" notation, e.g. 17F where A=17 El(ement) = F
energy_fwhm = 12.8  # Beam energy FWHM [MeV]
dedx_scale  = 1.0   # Beam stopping power scale factor

[target]
species  = "12C"
compound = "28Mg"

[detector]
eloss_bins = 500  # Number of bins for y axis
max_eloss  = 10.0 # Max y value [MeV]
strip      = -1   # Strip where reaction takes place. Use -1 for unreacted beam
eres       = 0.05 # Energy noise level (sigma) in each strip [MeV]

[run]
n_events  = 100         # Number of events simulated
wait      = 0           # Wait between simulated events? 1=yes, 0=no
update    = 0           # Update graphics between simulated events? 1=yes, 0=no
max_time  = 2000.0      # Maximum time for an event [ns]
sim_step  = 0.001       # Simulation step size [cm] (default 1e-3 cm)
method    = 0
output    = "test.root"
file_opt  = "recreate"
print_opt = 0
